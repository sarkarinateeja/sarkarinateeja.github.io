<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - Sarkari Nateeja</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:#f5f5f5}
.header{background:#ab183d;color:#fff;padding:12px;text-align:center}
.logo{display:flex;align-items:center;justify-content:center;gap:10px}
.logo svg{width:45px;height:45px;background:#fff;border-radius:50%;padding:3px}
.logo h1{font-size:24px}
.wrap{max-width:1000px;margin:15px auto;padding:0 10px}
.box{background:#fff;border:2px solid #ddd;margin-bottom:15px}
.box-h{background:#ab183d;color:#fff;padding:10px;font-weight:bold}
.box-b{padding:15px}
input,select,textarea{width:100%;padding:9px;margin:6px 0;border:1px solid #ccc;border-radius:4px;font-family:Arial;font-size:14px}
textarea{resize:vertical}
label{font-weight:bold;font-size:13px;color:#333;display:block;margin-top:8px}
.btn{background:#ab183d;color:#fff;border:0;padding:10px 18px;border-radius:4px;cursor:pointer;font-weight:bold;margin-right:8px}
.btn:hover{background:#8a122f}
.btn-g{background:#088808}
.post-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #eee;font-size:14px}
.post-item b{color:#ab183d}
.small{font-size:12px;color:#666}
.alert{padding:10px;margin:10px 0;border-radius:4px;font-size:14px}
.alert-ok{background:#e8f5e9;color:#2e7d32;border-left:4px solid #2e7d32}
.alert-err{background:#ffebee;color:#c62828;border-left:4px solid #c62828}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header">
<div class="logo">
<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#fff" stroke="#ab183d" stroke-width="2"/><path d="M50 5 A45 45 0 0 1 50 95" fill="#FF9933"/><path d="M50 5 A45 45 0 0 0 50 95" fill="#138808"/><circle cx="50" cy="50" r="26" fill="#fff"/></svg>
<div><h1>SARKARI NATEEJA</h1><div style="font-size:11px">Admin Panel</div></div>
</div>
</header>

<div class="wrap">
<!-- GitHub Settings -->
<div class="box">
<div class="box-h">⚙️ GitHub Settings (Ek baar bharo)</div>
<div class="box-b">
<div class="grid2">
<div><label>GitHub Username</label><input id="ghUser" placeholder="sarkarinateeja"></div>
<div><label>Repo Name</label><input id="ghRepo" placeholder="sarkarinateeja.github.io"></div>
</div>
<label>Personal Access Token (repo permission)</label><input id="ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx">
<button class="btn" onclick="saveGH()">Save Settings</button>
<span id="ghStatus" class="small"></span>
<div class="small" style="margin-top:8px">Token kaise banaye: GitHub → Settings → Developer settings → Tokens (classic) → Generate → repo tick karo</div>
</div>
</div>

<!-- Add Post -->
<div class="box">
<div class="box-h">📝 Naya Post / Edit Post</div>
<div class="box-b">
<form id="form" onsubmit="savePost(event)">
<input type="hidden" id="pid">
<label>Title *</label><input id="ptitle" required placeholder="RRB NTPC Result 2024 Declared">
<div class="grid2">
<div><label>Category *</label>
<select id="pcat" required><option>Latest Jobs</option><option>Results</option><option>Admit Card</option><option>Answer Key</option><option>Syllabus</option><option>Admission</option></select></div>
<div><label>Date</label><input id="pdate" type="date"></div>
</div>
<label>Official Link</label><input id="plink" type="url" placeholder="https://">
<label>Full Article / Blog (1000-2000 words) *</label>
<textarea id="particle" rows="14" required placeholder="Yahan pura article likhein...

Example:
RRB NTPC ka result aaj jari hua hai...

Important Dates:
- ...

Kaise check karein:
1. ...
2. ...

HTML tags use kar sakte hain: <h3>, <b>, <br>"></textarea>
<label>Important Links (Har line: Text|URL)</label>
<textarea id="plinks" rows="3" placeholder="Check Result|https://example.com/result
Download PDF|https://example.com/pdf"></textarea>
<label><input type="checkbox" id="pnew" checked> Mark as NEW (Breaking news + blink)</label>
<br><br>
<button type="submit" class="btn">💾 Save Locally</button>
<button type="button" class="btn btn-g" onclick="publishGitHub()">🚀 Publish to GitHub</button>
<button type="button" class="btn" style="background:#666" onclick="clearForm()">Clear</button>
</form>
<div id="msg"></div>
</div>

<!-- Posts List -->
<div class="box">
<div class="box-h">📋 Saved Posts (<span id="count">0</span>)</div>
<div class="box-b" style="padding:0">
<div id="list"></div>
</div>
</div>
</div>

<script>
let posts = JSON.parse(localStorage.getItem('sn_admin_posts')||'[]');
const $=id=>document.getElementById(id);

function loadGH(){
  $('ghUser').value = localStorage.getItem('gh_user')||'';
  $('ghRepo').value = localStorage.getItem('gh_repo')||'sarkarinateeja.github.io';
  $('ghToken').value = localStorage.getItem('gh_token')||'';
  $('ghStatus').textContent = localStorage.getItem('gh_token')?'✓ Saved':'';
}
function saveGH(){
  localStorage.setItem('gh_user',$('ghUser').value.trim());
  localStorage.setItem('gh_repo',$('ghRepo').value.trim());
  localStorage.setItem('gh_token',$('ghToken').value.trim());
  $('ghStatus').textContent='✓ Saved'; alert('Settings saved!');
}
loadGH();

function render(){
  $('count').textContent = posts.length;
  $('list').innerHTML = posts.map(p=>`
    <div class="post-item">
      <div><b>${p.t}</b><br><span class="small">${p.c} | ${p.d} ${p.n==='TRUE'?'<span style="color:red">• NEW</span>':''}</span></div>
      <div><button onclick="editPost(${p.id})" class="btn" style="padding:5px 10px;font-size:12px">Edit</button>
      <button onclick="delPost(${p.id})" class="btn" style="padding:5px 10px;font-size:12px;background:#c62828">Del</button></div>
    </div>`).join('') || '<div style="padding:15px;color:#999">No posts yet</div>';
  $('pdate').valueAsDate = new Date();
}
render();

function clearForm(){$('form').reset();$('pid').value='';$('pdate').valueAsDate=new Date();$('pnew').checked=true}

function savePost(e){
  e.preventDefault();
  const p={
    id: Number($('pid').value)||Date.now(),
    t:$('ptitle').value.trim(),
    c:$('pcat').value,
    d:$('pdate').value,
    l:$('plink').value.trim(),
    a:$('particle').value.trim(),
    links:$('plinks').value.trim(),
    n:$('pnew').checked?'TRUE':'FALSE'
  };
  posts = posts.filter(x=>x.id!==p.id);
  posts.unshift(p);
  localStorage.setItem('sn_admin_posts',JSON.stringify(posts));
  showMsg('✓ Post saved locally. Ab "Publish to GitHub" dabao.','ok');
  clearForm(); render();
}

function editPost(id){
  const p=posts.find(x=>x.id===id); if(!p)return;
  $('pid').value=p.id; $('ptitle').value=p.t; $('pcat').value=p.c; $('pdate').value=p.d;
  $('plink').value=p.l; $('particle').value=p.a; $('plinks').value=p.links||''; $('pnew').checked=p.n==='TRUE';
  window.scrollTo(0,0);
}
function delPost(id){if(!confirm('Delete?'))return; posts=posts.filter(x=>x.id!==id);localStorage.setItem('sn_admin_posts',JSON.stringify(posts));render();}

function showMsg(t,ty){$('msg').innerHTML=`<div class="alert alert-${ty==='ok'?'ok':'err'}">${t}</div>`;setTimeout(()=>$('msg').innerHTML='',5000)}

async function publishGitHub(){
  const user=$('ghUser').value.trim(), repo=$('ghRepo').value.trim(), token=$('ghToken').value.trim();
  if(!user||!repo||!token){alert('Pehle GitHub settings bharo');return}
  if(posts.length===0){alert('Koi post nahi hai');return}
  
  showMsg('⏳ GitHub pe upload ho raha hai...','ok');
  
  const content = {items: posts.map(({id,...rest})=>rest)};
  const body = JSON.stringify(content,null,2);
  const b64 = btoa(unescape(encodeURIComponent(body)));
  
  try{
    // Get current file sha
    let sha=null;
    const getRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/data.json`,{
      headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}
    });
    if(getRes.ok){const data=await getRes.json(); sha=data.sha;}
    
    // Upload
    const putRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/data.json`,{
      method:'PUT',
      headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        message:`Update posts - ${new Date().toLocaleString('hi-IN')}`,
        content:b64,
        sha:sha
      })
    });
    
    if(putRes.ok){
      showMsg('✅ SUCCESS! GitHub pe update ho gaya. 1-2 minute me website pe dikhega.','ok');
    }else{
      const err=await putRes.json(); showMsg('❌ Error: '+(err.message||'Upload failed'),'err');
    }
  }catch(e){showMsg('❌ Network error: '+e.message,'err')}
}
</script>
</body>
</html>
